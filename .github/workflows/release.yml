name: Build and Release Electron App (electron-builder)

on:
    push:
        branches:
            - release

jobs:
    compile:
        name: Compile (Typecheck + Vite Build)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'

            - name: Install Dependencies
              run: npm ci

            - name: Typecheck and Build
              run: npm run build

            - name: Upload Compiled Output
              uses: actions/upload-artifact@v4
              with:
                  name: compiled-output
                  path: out/
                  retention-days: 1

    package:
        name: Package Windows MSI (${{ matrix.arch }})
        needs: compile
        runs-on: windows-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: x64
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'

            - name: Install Dependencies
              run: npm ci

            - name: Download Compiled Output
              uses: actions/download-artifact@v4
              with:
                  name: compiled-output
                  path: out/

            # ── Windows MSI packaging ──
            - name: Package Windows MSI
              run: npx electron-builder --win msi --${{ matrix.arch }} --publish never

            # ── Windows code signing ──
            - name: Azure Trusted Signing (Windows Only)
              continue-on-error: true
              uses: azure/trusted-signing-action@v0.5.1
              with:
                  azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
                  endpoint: https://eus.codesigning.azure.net/
                  trusted-signing-account-name: open-webui
                  certificate-profile-name: open-webui
                  files-folder: dist
                  files-folder-filter: msi

            # ── Upload release artifacts ──
            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: windows-msi-${{ matrix.arch }}
                  path: |
                      dist/*.msi
                  if-no-files-found: warn

    release:
        name: Create GitHub Release
        needs: package
        if: >-
            github.event_name == 'push' &&
            github.ref == 'refs/heads/release' &&
            !cancelled() &&
            needs.package.result != 'failure'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                  sparse-checkout: |
                      package.json
                      CHANGELOG.md
                  sparse-checkout-cone-mode: false

            - name: Get version from package.json
              id: version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Release version: $VERSION"

            - name: Extract changelog for this version
              id: changelog
              run: |
                  # Extract the section for the current version from CHANGELOG.md
                  VERSION="${{ steps.version.outputs.version }}"
                  # Get content between ## [VERSION] and the next ## [ heading
                  NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
                  if [ -z "$NOTES" ]; then
                    NOTES="Release v$VERSION"
                  fi
                  # Write to file to preserve multiline content
                  echo "$NOTES" > /tmp/release_notes.md
                  echo "Changelog notes:"
                  cat /tmp/release_notes.md

            - name: Download Artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: 'windows-msi-*'
                  merge-multiple: false

            - name: Create Release
              uses: softprops/action-gh-release@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: v${{ steps.version.outputs.version }}
                  name: v${{ steps.version.outputs.version }}
                  body_path: /tmp/release_notes.md
                  draft: false
                  prerelease: false
                  files: |
                      windows-msi-*/*.msi
